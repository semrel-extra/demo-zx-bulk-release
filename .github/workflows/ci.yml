name: CI
on:
  push:
    branches: [master]
    tags: ['zbr-rebuild.*']
  pull_request:

permissions: {}

jobs:
  push:
    name: Push ${{ github.ref }}
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      checks: read
      statuses: write
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Fetch depth
        env:
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: echo "FETCH_DEPTH=$(echo "$COMMITS_JSON" | jq 'length | if . < 20 then . + 1 else 0 end')" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ env.FETCH_DEPTH }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Receive
        if: github.ref == 'refs/heads/master'
        id: receive
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx zx-bulk-release --receive

      - name: Upload context
        if: github.ref == 'refs/heads/master'
        uses: actions/upload-artifact@v7
        with:
          name: context-${{ github.run_id }}
          path: zbr-context.json
          retention-days: 1

      - name: Fetch deps
        run: yarn --silent --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Pack
        if: github.ref == 'refs/heads/master' && steps.receive.outputs.status == 'proceed'
        run: npx zx-bulk-release --no-build --no-test --pack

      - name: Upload parcels
        if: github.ref == 'refs/heads/master' && steps.receive.outputs.status == 'proceed'
        uses: actions/upload-artifact@v7
        with:
          name: parcels-${{ github.run_id }}
          path: parcels
          retention-days: 1

  deliver:
    name: Deliver
    needs: push
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Download context
        uses: actions/download-artifact@v8
        with:
          name: context-${{ github.run_id }}
          path: .
        id: context
        continue-on-error: true

      - name: Download parcels
        if: steps.context.outcome == 'success'
        uses: actions/download-artifact@v8
        with:
          name: parcels-${{ github.run_id }}
          path: parcels-unverified
        id: download
        continue-on-error: true

      - name: Verify
        if: steps.context.outcome == 'success' && steps.download.outcome == 'success'
        run: npx zx-bulk-release --verify parcels-unverified/

      - name: Deliver
        if: steps.context.outcome == 'success' && steps.download.outcome == 'success'
        env:
          NPM_OIDC: true
          GH_USER: ${{ secrets.GH_USER }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GIT_COMMITTER_NAME: ${{ secrets.GIT_COMMITTER_NAME }}
          GIT_COMMITTER_EMAIL: ${{ secrets.GIT_COMMITTER_EMAIL }}
        run: npx zx-bulk-release --deliver

      - name: Update delivery status
        if: steps.context.outcome == 'success' && steps.download.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: parcels-${{ github.run_id }}
          path: parcels
          overwrite: true
          retention-days: 1

  pr:
    if: github.event_name == 'pull_request'
    name: PR
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Fetch depth
        env:
          PR_COMMITS: ${{ github.event.pull_request.commits }}
        run: echo "PR_FETCH_DEPTH=$(( PR_COMMITS + 1 ))" >> "${GITHUB_ENV}"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: ${{ env.PR_FETCH_DEPTH }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'yarn'

      - name: Fetch deps
        run: yarn --silent --immutable

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
